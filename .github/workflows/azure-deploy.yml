name: Deploy Flask RAG App to Azure

on:
  push:
    branches:
      - main

env:
  AZURE_WEBAPP_NAME: far-rag-chatbot
  AZURE_REGISTRY_NAME: farregistry
  AZURE_REGISTRY_LOGIN_SERVER: farregistry.azurecr.io
  IMAGE_NAME: far-rag-image

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Build and push Docker image
      uses: azure/docker-login@v1
      with:
        login-server: ${{ env.AZURE_REGISTRY_LOGIN_SERVER }}
        username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
        password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

    - run: |
        docker build -t $AZURE_REGISTRY_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }} .
        docker push $AZURE_REGISTRY_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        images: ${{ env.AZURE_REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
